name: Bluesky Movie Bot

on:
  schedule:
    # BD time = UTC + 6
    # Morning  : 3 AM UTC = 9 AM BD
    # Noon     : 7 AM UTC = 1 PM BD
    # Evening  : 2 PM UTC = 8 PM BD
    - cron: "0 3 * * *"
    - cron: "0 7 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write   # posted_movies.json commit করার জন্য দরকার

jobs:
  post:
    name: Post Movie
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TMDB_API_KEY:      ${{ secrets.TMDB_API_KEY }}
      BSKY_HANDLE:       ${{ secrets.BSKY_HANDLE }}
      BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py

      - name: Commit posted_movies.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_movies.json
          git diff --cached --quiet || git commit -m "chore: update posted_movies.json [skip ci]"
          git push
